<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100" role="img" aria-label="Indi">
  <style>
    .b1,.b2,.b3{transform-box:fill-box;transform-origin:center bottom;}
    .dot{transform-box:fill-box;transform-origin:center;}
    .b1{animation:rise .5s ease-out .15s both;}
    .b2{animation:rise .5s ease-out .50s both;}
    .b3{animation:riseBlue .7s ease-out .85s both;}
    .dot{animation:pop .5s cubic-bezier(.2,1.3,.4,1) 1.35s both;}
    @keyframes rise{0%{opacity:0;transform:translateY(7px);}100%{opacity:1;transform:translateY(0);}}
    @keyframes riseBlue{0%{opacity:0;transform:translateY(7px);fill:#0E1116;}60%{opacity:1;transform:translateY(0);fill:#0E1116;}100%{opacity:1;transform:translateY(0);fill:#0E4FB0;}}
    @keyframes pop{0%{opacity:0;transform:scale(.2);}60%{opacity:1;transform:scale(1.15);}100%{opacity:1;transform:scale(1);}}
    @media (prefers-reduced-motion: reduce){.b1,.b2,.dot{animation:none;opacity:1;transform:none;}.b3{animation:none;opacity:1;transform:none;fill:#0E4FB0;}}
  </style>
  <rect class="b1" x="14" y="60" width="16" height="30" rx="8" fill="#0E1116"/>
  <rect class="b2" x="41" y="42" width="16" height="48" rx="8" fill="#0E1116"/>
  <rect class="b3" x="68" y="28" width="16" height="62" rx="8" fill="#0E1116"/>
  <circle class="dot" cx="76" cy="13" r="8" fill="#0E4FB0"/>
</svg>
